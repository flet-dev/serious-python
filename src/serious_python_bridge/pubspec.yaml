name: serious_python_bridge
description: Generic in-process Dart ↔ Python byte transport for the embedded Python runtime provided by serious_python.
homepage: https://flet.dev
repository: https://github.com/flet-dev/serious-python
version: 2.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.7.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  serious_python:
    path: ../serious_python
  serious_python_darwin:
    path: ../serious_python_darwin

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        pluginClass: SeriousPythonBridgePlugin
        ffiPlugin: true
        sharedDarwinSource: true
      macos:
        pluginClass: SeriousPythonBridgePlugin
        ffiPlugin: true
        sharedDarwinSource: true
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true

group 'com.flet.serious_python_android'
version '2.0.0'
    
def python_version = System.getenv('SERIOUS_PYTHON_VERSION') ?: '3.14'
def dart_bridge_version = System.getenv('DART_BRIDGE_VERSION') ?: '1.2.1'

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        // The Android Gradle Plugin knows how to build native code with the NDK.
        classpath 'com.android.tools.build:gradle:7.3.0'
        classpath 'de.undercouch:gradle-download-task:4.1.2'
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'
apply plugin: 'de.undercouch.download'

android {
    namespace "com.flet.serious_python_android"

    // Bumping the plugin compileSdkVersion requires all clients of this plugin
    // to bump the version in their app.
    compileSdkVersion 31

    // No native code is compiled here — libdart_bridge.so is downloaded as a
    // pre-built artifact from flet-dev/dart-bridge releases (see the
    // downloadDartBridge_$abi tasks below) and dropped into jniLibs.

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        minSdkVersion 21

        ndk {
            // python-build dropped 32-bit Android in 3.13 (PEP 738), so the
            // python-android-dart-<ver>-armeabi-v7a tarball only exists for 3.12.
            if (python_version == '3.12') {
                abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
            } else {
                abiFilters 'arm64-v8a', 'x86_64'
            }
        }
    }

    packagingOptions {
        doNotStrip "*/arm64-v8a/libpython*.so"
        doNotStrip "*/armeabi-v7a/libpython*.so"
        doNotStrip "*/x86/libpython*.so"
        doNotStrip "*/x86_64/libpython*.so"
    }
}

import de.undercouch.gradle.tasks.download.Download

def fletCacheRoot = System.getenv('FLET_CACHE_DIR')
def pythonCacheDir = new File(
    fletCacheRoot ? new File(fletCacheRoot) : new File(System.getProperty('user.home'), '.flet/cache'),
    "python-build/v${python_version}"
)
def dartBridgeCacheDir = new File(
    fletCacheRoot ? new File(fletCacheRoot) : new File(System.getProperty('user.home'), '.flet/cache'),
    "dart-bridge/v${dart_bridge_version}"
)

task copyBuildDist(type: Copy) {
    def srcDir = System.getenv('SERIOUS_PYTHON_BUILD_DIST')
    if (srcDir != null) {
        from srcDir
        into 'src/main/jniLibs'
    }
}

// Loop through abiFilters
def packageTasks = []
android.defaultConfig.ndk.abiFilters.each { abi ->

    def srcDir = System.getenv('SERIOUS_PYTHON_SITE_PACKAGES')
    if (srcDir == null || srcDir.allWhitespace) {
        throw new InvalidUserDataException("SERIOUS_PYTHON_SITE_PACKAGES environment variable is not set.")
    }

    packageTasks.add("zipSitePackages_$abi")
    packageTasks.add("copyOpt_$abi")

    tasks.register("jniCleanUp_$abi", Delete) {
        delete "src/main/jniLibs/$abi"
    }

    tasks.register("downloadDistArchive_$abi", Download) {
        src "https://github.com/flet-dev/python-build/releases/download/v${python_version}/python-android-dart-${python_version}-${abi}.tar.gz"
        dest new File(pythonCacheDir, "python-android-dart-${python_version}-${abi}.tar.gz")
        onlyIfModified true
        useETag "all"
        tempAndMove true
        doFirst { dest.parentFile.mkdirs() }
    }
    tasks.register("untarFile_$abi", Copy) {
        from tarTree(tasks.named("downloadDistArchive_$abi").get().dest)
        into "src/main/jniLibs/$abi"
        dependsOn "jniCleanUp_$abi", "downloadDistArchive_$abi"
    }

    tasks.register("copyOpt_$abi", Copy) {
        from fileTree(dir: "$srcDir/$abi/opt", include: ["**/*.so"])
        into "src/main/jniLibs/$abi"
        eachFile {
            path = name
        }
        includeEmptyDirs = false
        dependsOn "jniCleanUp_$abi"
    }

    tasks.register("zipSitePackages_$abi", Zip) {
        from fileTree(dir: "$srcDir/$abi")
        archiveFileName = "libpythonsitepackages.so"
        destinationDirectory = file("src/main/jniLibs/$abi")
        dependsOn "jniCleanUp_$abi", "untarFile_$abi"
    }

    // dart-bridge ships a per-(abi × Python-minor-version) prebuilt .so. The
    // binary's DT_NEEDED is libpython3.X.so (version-specific), so the bridge
    // .so MUST match the libpython bundled in the same APK. We download from
    // the pinned dart_bridge_version release into a cache shared across
    // builds, then drop it as `libdart_bridge.so` (no version suffix) so the
    // Dart side can DynamicLibrary.open by a stable short name.
    tasks.register("downloadDartBridge_$abi", Download) {
        src "https://github.com/flet-dev/dart-bridge/releases/download/v${dart_bridge_version}/libdart_bridge-android-${abi}-py${python_version}.so"
        dest new File(dartBridgeCacheDir, "libdart_bridge-android-${abi}-py${python_version}.so")
        onlyIfModified true
        useETag "all"
        tempAndMove true
        doFirst { dest.parentFile.mkdirs() }
    }
    tasks.register("copyDartBridge_$abi", Copy) {
        from tasks.named("downloadDartBridge_$abi").get().dest
        into "src/main/jniLibs/$abi"
        rename '.*', 'libdart_bridge.so'
        dependsOn "downloadDartBridge_$abi", "jniCleanUp_$abi"
    }
    packageTasks.add("copyDartBridge_$abi")
}

if (System.getenv('SERIOUS_PYTHON_BUILD_DIST')) {
    task copyOrUntar(dependsOn: 'copyBuildDist')
} else {
    task copyOrUntar(dependsOn: packageTasks)
}

preBuild.dependsOn copyOrUntar

name: serious_python_darwin
description: iOS and macOS implementations of the serious_python plugin
homepage: https://flet.dev
repository: https://github.com/flet-dev/serious-python
version: 4.0.0

environment:
  # Swift Package Manager support (the FlutterFramework SwiftPM convention) lands
  # in Flutter 3.44 / Dart 3.11; this is also the de-facto floor from dart_bridge.
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  serious_python_platform_interface:
    path: ../serious_python_platform_interface
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  
flutter:
  plugin:
    implements: serious_python
    platforms:
      ios:
        pluginClass: SeriousPythonPlugin
        dartPluginClass: SeriousPythonDarwin
        ffiPlugin: true
        sharedDarwinSource: true
      macos:
        pluginClass: SeriousPythonPlugin
        dartPluginClass: SeriousPythonDarwin
        ffiPlugin: true
        sharedDarwinSource: true

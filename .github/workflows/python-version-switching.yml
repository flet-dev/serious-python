name: Python version switching

# Regression guard for switching the embedded Python version on a single
# machine: the matrix CI (one VM per version) can't catch a stale runtime left
# over from a previous version, so this job builds run_example for several
# versions *sequentially on the same runner* (including a downgrade) and asserts
# the running interpreter — and its numpy wheel — match each requested version.
#
# Gated (heavy: per-version package + build) — runs on PRs that touch the
# version/darwin machinery, manually, and nightly.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  pull_request:
    paths:
      - "src/serious_python_darwin/**"
      - "src/serious_python/lib/src/python_versions.dart"
      - "src/serious_python/bin/**"
      - "src/serious_python/example/run_example/**"
      - ".github/workflows/python-version-switching.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  switch_macos:
    name: Switch Python versions on macOS
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          path: ".fvmrc"
          cache: true

      - name: Package + run version_test for each Python (same VM)
        working-directory: src/serious_python/example/run_example
        run: |
          set -euo pipefail
          export SERIOUS_PYTHON_SITE_PACKAGES="$(pwd)/build/site-packages"
          flutter pub get
          for v in 3.12 3.13 3.14 3.12; do
            echo "::group::Python $v"
            export SERIOUS_PYTHON_VERSION=$v
            # NOTE: no `rm -rf Pods` — package stages the interpreter so a bare
            # repackage + rebuild switches versions on its own.
            dart run serious_python:main package app/src \
              --platform Darwin --python-version "$v" -r -r -r app/src/requirements.txt
            flutter test integration_test/version_test.dart -d macos \
              --dart-define=EXPECTED_PYTHON_VERSION="$v"
            echo "::endgroup::"
          done

  switch_ios:
    name: Switch Python versions on iOS
    runs-on: macos-26
    timeout-minutes: 50
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          path: ".fvmrc"
          cache: true

      - name: Setup iOS Simulator
        id: simulator
        uses: futureware-tech/simulator-action@v5
        with:
          model: "iPhone 17 Pro Max"
          os: "iOS"
          os_version: "26.5"
          shutdown_after_job: true
          wait_for_boot: true

      - name: Package + run version_test for each Python (same VM)
        working-directory: src/serious_python/example/run_example
        run: |
          set -euo pipefail
          export SERIOUS_PYTHON_SITE_PACKAGES="$(pwd)/build/site-packages"
          flutter pub get
          for v in 3.12 3.13 3.14 3.12; do
            echo "::group::Python $v"
            export SERIOUS_PYTHON_VERSION=$v
            dart run serious_python:main package app/src \
              --platform iOS --python-version "$v" -r -r -r app/src/requirements.txt
            flutter test integration_test/version_test.dart \
              -d ${{ steps.simulator.outputs.udid }} \
              --dart-define=EXPECTED_PYTHON_VERSION="$v"
            echo "::endgroup::"
          done

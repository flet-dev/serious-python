name: CI

# TEMPORARY (dart-bridge branch only): scoped to main + tags + dispatch so
# iteration pushes to dart-bridge don't fire the slow flet_example platform
# matrix (~20-30 min per run). The throwaway test-bridge-build.yml covers
# the new bridge work fast. REVERT to `branches: '**'` before merging.
on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

env:
  ROOT: "${{ github.workspace }}"
  SCRIPTS: "${{ github.workspace }}/.github/scripts"
  SERIOUS_PYTHON_SITE_PACKAGES: "${{ github.workspace }}/site-packages"
  UV_PYTHON: "3.12"

jobs:
  macos:
    name: Test on macOS (Python ${{ matrix.python_version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ['3.12', '3.13', '3.14']
    env:
      SERIOUS_PYTHON_VERSION: ${{ matrix.python_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          path: '.fvmrc'
          cache: true

      - name: Run tests
        working-directory: "src/serious_python/example/flet_example"
        run: |
          dart run serious_python:main package app/src --platform Darwin --python-version ${{ matrix.python_version }} --requirements flet==0.28.3
          flutter test integration_test --device-id macos --dart-define=EXPECTED_PYTHON_VERSION=${{ matrix.python_version }}

  ios:
    name: Test on iOS (Python ${{ matrix.python_version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ['3.12', '3.13', '3.14']
    env:
      SERIOUS_PYTHON_VERSION: ${{ matrix.python_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          path: '.fvmrc'
          cache: true

      - name: Setup iOS Simulator
        id: simulator
        uses: futureware-tech/simulator-action@v4
        with:
          # https://github.com/futureware-tech/simulator-action/wiki/Devices-macos-latest
          model: 'iPhone 16 Pro Max'
          os: "iOS"
          os_version: "^18.6"
          shutdown_after_job: true
          wait_for_boot: true

      - name: Run tests
        working-directory: "src/serious_python/example/flet_example"
        run: |
          dart run serious_python:main package app/src --platform iOS --python-version ${{ matrix.python_version }} --requirements flet==0.28.3
          flutter test integration_test --device-id ${{ steps.simulator.outputs.udid }} --dart-define=EXPECTED_PYTHON_VERSION=${{ matrix.python_version }}

  android:
    name: Test on Android (Python ${{ matrix.python_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ['3.12', '3.13', '3.14']
    env:
      SERIOUS_PYTHON_VERSION: ${{ matrix.python_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          path: '.fvmrc'
          cache: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd

      - name: Setup Android Emulator + Run tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          EMULATOR_PORT: 5554
        with:
          avd-name: android_emulator
          api-level: 33
          target: google_atd
          arch: x86_64
          profile: pixel_5
          sdcard-path-or-size: 128M
          ram-size: 2048M
          disk-size: 4096M
          emulator-port: ${{ env.EMULATOR_PORT }}
          disable-animations: true
          emulator-options: -no-window -noaudio -no-boot-anim -wipe-data -cache-size 1000 -partition-size 8192
          pre-emulator-launch-script: |
            sdkmanager --list_installed
          script: |
            cd src/serious_python/example/flet_example && dart run serious_python:main package app/src --platform Android --python-version ${{ matrix.python_version }} --requirements flet==0.28.3
            cd src/serious_python/example/flet_example && flutter test integration_test --device-id emulator-${{ env.EMULATOR_PORT }} --dart-define=EXPECTED_PYTHON_VERSION=${{ matrix.python_version }}

  windows:
    name: Test on Windows (Python ${{ matrix.python_version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ['3.12', '3.13', '3.14']
    env:
      SERIOUS_PYTHON_VERSION: ${{ matrix.python_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          path: '.fvmrc'
          cache: true

      - name: Run tests
        working-directory:  "src/serious_python/example/flet_example"
        run: |
          dart run serious_python:main package app/src --platform Windows --python-version ${{ matrix.python_version }} --requirements flet==0.28.3
          flutter test integration_test -d windows --dart-define=EXPECTED_PYTHON_VERSION=${{ matrix.python_version }}

  linux:
    name: Test on Linux ${{ matrix.title }} (Python ${{ matrix.python_version }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        python_version: ['3.12', '3.13', '3.14']
        arch: [arm64, amd64]
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
            title: ARM64
          - arch: amd64
            runner: ubuntu-24.04
            title: AMD64
    env:
      SERIOUS_PYTHON_VERSION: ${{ matrix.python_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Get Flutter version from ".fvmrc"
        uses: kuhnroyal/flutter-fvm-config-action/config@v3
        id: fvm-config-action
        with:
          path: '.fvmrc'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ matrix.arch == 'arm64' && 'master' || 'stable' }}  # https://github.com/subosito/flutter-action/issues/345#issuecomment-2657332687
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install -y xvfb libgtk-3-dev
          
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            sudo apt-get install -y \
              libgstreamer1.0-dev \
              libgstreamer-plugins-base1.0-dev \
              libgstreamer-plugins-bad1.0-dev \
              gstreamer1.0-plugins-base \
              gstreamer1.0-plugins-good \
              gstreamer1.0-plugins-bad \
              gstreamer1.0-plugins-ugly \
              gstreamer1.0-libav \
              gstreamer1.0-tools \
              gstreamer1.0-x \
              gstreamer1.0-alsa \
              gstreamer1.0-gl \
              gstreamer1.0-gtk3 \
              gstreamer1.0-qt5 \
              gstreamer1.0-pulseaudio
          else
            sudo apt-get install -y \
              clang \
              ninja-build \
              gstreamer1.0-plugins-bad \
              gstreamer1.0-plugins-ugly \
              gstreamer1.0-libav
          fi

      - name: Run tests
        working-directory: src/serious_python/example/flet_example
        run: |
          flutter pub get
          dart run serious_python:main package app/src --platform Linux --python-version ${{ matrix.python_version }} --requirements flet==0.28.3
          xvfb-run flutter test integration_test -d linux --dart-define=EXPECTED_PYTHON_VERSION=${{ matrix.python_version }}

  bridge_example_macos:
    name: Test bridge example on macOS (Python ${{ matrix.python_version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ['3.12', '3.13', '3.14']
    env:
      SERIOUS_PYTHON_VERSION: ${{ matrix.python_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          path: '.fvmrc'
          cache: true

      - name: Run integration test
        working-directory: "src/serious_python_bridge/example"
        run: |
          dart run serious_python:main package app/src --platform Darwin --python-version ${{ matrix.python_version }}
          flutter test integration_test -d macos

  bridge_example_ios:
    name: Test bridge example on iOS (Python ${{ matrix.python_version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ['3.12', '3.13', '3.14']
    env:
      SERIOUS_PYTHON_VERSION: ${{ matrix.python_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          path: '.fvmrc'
          cache: true

      - name: Setup iOS Simulator
        id: simulator
        uses: futureware-tech/simulator-action@v4
        with:
          model: 'iPhone 16 Pro Max'
          os: "iOS"
          os_version: "^18.6"
          shutdown_after_job: true
          wait_for_boot: true

      - name: Run integration test
        working-directory: "src/serious_python_bridge/example"
        run: |
          dart run serious_python:main package app/src --platform iOS --python-version ${{ matrix.python_version }}
          flutter test integration_test --device-id ${{ steps.simulator.outputs.udid }}

  bridge_example_linux:
    name: Test bridge example on Linux ${{ matrix.title }} (Python ${{ matrix.python_version }})
    runs-on: ${{ matrix.runner }}
    # Linux desktop needs the dart_bridge abi3 wheel installed into the bundled
    # Python (no static-link path like on Apple); pull it from the wheel build.
    needs: release_build
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        python_version: ['3.12', '3.13', '3.14']
        arch: [arm64, amd64]
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
            title: ARM64
            wheel_artifact: bridge-wheels-ubuntu-24.04-arm
          - arch: amd64
            runner: ubuntu-24.04
            title: AMD64
            wheel_artifact: bridge-wheels-ubuntu-24.04
    env:
      SERIOUS_PYTHON_VERSION: ${{ matrix.python_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Get Flutter version from .fvmrc
        uses: kuhnroyal/flutter-fvm-config-action/config@v3
        id: fvm-config-action
        with:
          path: '.fvmrc'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ matrix.arch == 'arm64' && 'master' || 'stable' }}
          cache: true

      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install -y xvfb libgtk-3-dev
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            sudo apt-get install -y \
              libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
              libgstreamer-plugins-bad1.0-dev gstreamer1.0-plugins-base \
              gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
              gstreamer1.0-plugins-ugly gstreamer1.0-libav
          else
            sudo apt-get install -y \
              clang ninja-build gstreamer1.0-plugins-bad \
              gstreamer1.0-plugins-ugly gstreamer1.0-libav
          fi

      - name: Download dart_bridge wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.wheel_artifact }}
          path: ${{ runner.temp }}/dart_bridge_wheels

      - name: Pick matching wheel for this arch
        id: wheel
        run: |
          set -euo pipefail
          # cibuildwheel produces one wheel per arch in this artifact; the
          # repaired manylinux wheel is the one we want.
          WHL=$(ls "${{ runner.temp }}/dart_bridge_wheels"/dart_bridge-*manylinux*.whl | head -n1)
          test -n "$WHL"
          echo "path=$WHL" >> "$GITHUB_OUTPUT"
          echo "Picked: $WHL"

      - name: Run integration test
        working-directory: src/serious_python_bridge/example
        run: |
          flutter pub get
          dart run serious_python:main package app/src \
            --platform Linux \
            --python-version ${{ matrix.python_version }} \
            --requirements ${{ steps.wheel.outputs.path }}
          xvfb-run flutter test integration_test -d linux

  bridge_example_windows:
    name: Test bridge example on Windows (Python ${{ matrix.python_version }})
    runs-on: windows-latest
    needs: release_build
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        python_version: ['3.12', '3.13', '3.14']
    env:
      SERIOUS_PYTHON_VERSION: ${{ matrix.python_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          path: '.fvmrc'
          cache: true

      - name: Download dart_bridge wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: bridge-wheels-windows-latest
          path: ${{ runner.temp }}\dart_bridge_wheels

      - name: Pick matching wheel
        id: wheel
        shell: bash
        run: |
          set -euo pipefail
          WHL=$(ls "$RUNNER_TEMP/dart_bridge_wheels"/dart_bridge-*-win_amd64.whl | head -n1)
          test -n "$WHL"
          echo "path=$WHL" >> "$GITHUB_OUTPUT"
          echo "Picked: $WHL"

      - name: Run integration test
        working-directory: "src/serious_python_bridge/example"
        run: |
          dart run serious_python:main package app/src --platform Windows --python-version ${{ matrix.python_version }} --requirements ${{ steps.wheel.outputs.path }}
          flutter test integration_test -d windows

  release_build:
    name: Build dart_bridge wheel (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        # Apple platforms use static-link + inittab (see serious_python_bridge/
        # darwin/), so no macOS/iOS wheel. Android needs an NDK cross-build
        # that's deferred to a follow-up CI change.
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        with:
          package-dir: src/serious_python_bridge/python

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  release_build_android:
    name: Build dart_bridge.abi3.so (Android ${{ matrix.abi }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # Single abi3 binary per ABI works across all Python 3.12+ versions;
        # we only need to pin a Python version for the headers + libpython to
        # link against, not for the matrix dimension. 3.12 chosen for header
        # parity with the abi3 floor in pyproject.toml. armeabi-v7a is still
        # included because PEP 738 dropped it in 3.13, so 3.12 headers are
        # the only ones with that ABI tarball.
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    env:
      PYTHON_VERSION: "3.12"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download python-android-mobile-forge tarball (one tarball, all ABIs)
        run: |
          set -euo pipefail
          VER="$PYTHON_VERSION"
          ABI="${{ matrix.abi }}"
          ARCHIVE="python-android-mobile-forge-${VER}.tar.gz"
          curl -fL -o "$ARCHIVE" \
            "https://github.com/flet-dev/python-build/releases/download/v${VER}/${ARCHIVE}"
          # Extract only the python-*/include and python-*/lib subtrees for our
          # target ABI — the full archive is ~314MB and includes openssl/sqlite
          # builds we don't need.
          mkdir -p pydist
          tar -xzf "$ARCHIVE" -C pydist \
            "install/android/${ABI}/python-${VER}.13/include/" \
            "install/android/${ABI}/python-${VER}.13/lib/"
          find pydist -name "Python.h"
          find pydist -name "libpython*.so" | head -5

      - name: Cross-compile dart_bridge.abi3.so
        run: |
          set -euxo pipefail
          VER="$PYTHON_VERSION"
          ABI="${{ matrix.abi }}"

          case "$ABI" in
            arm64-v8a)    TARGET=aarch64-linux-android ;;
            armeabi-v7a)  TARGET=armv7a-linux-androideabi ;;
            x86_64)       TARGET=x86_64-linux-android ;;
            *) echo "unsupported ABI: $ABI" >&2 ; exit 1 ;;
          esac

          # Android API 21 matches serious_python_android's minSdkVersion.
          API=21
          NDK="${ANDROID_NDK_HOME:-${ANDROID_NDK_LATEST_HOME}}"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          CC="$TOOLCHAIN/bin/${TARGET}${API}-clang"
          test -x "$CC"

          INCLUDE_DIR=$(find pydist -path "*/python-${VER}.13/include/python${VER}" | head -n1)
          LIBPYTHON=$(find pydist -path "*/python-${VER}.13/lib/libpython${VER}.so" | head -n1)
          test -n "$INCLUDE_DIR" -a -n "$LIBPYTHON"

          # ABI in the filename so all three coexist as Release assets without
          # collision. package_command.dart renames back to dart_bridge.abi3.so
          # when placing into the bundled site-packages (CPython's import
          # mechanism requires the canonical name).
          OUT="dart_bridge.abi3-android-${ABI}.so"

          $CC -shared -fPIC -fvisibility=hidden \
            -DPy_LIMITED_API=0x030c0000 \
            -I"$INCLUDE_DIR" \
            -I"src/serious_python_bridge/native" \
            src/serious_python_bridge/native/dart_bridge.c \
            src/serious_python_bridge/native/dart_api/dart_api_dl.c \
            "$LIBPYTHON" \
            -Wl,-z,max-page-size=16384 \
            -o "$OUT"

          file "$OUT"
          ls -lh "$OUT"

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-android-${{ matrix.abi }}
          path: dart_bridge.abi3-android-*.so
          if-no-files-found: error

  collect_release:
    name: Attach bridge binaries to GitHub Release
    needs:
      - release_build
      - release_build_android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download wheel artifacts (Linux / Windows)
        uses: actions/download-artifact@v4
        with:
          pattern: bridge-wheels-*
          merge-multiple: true
          path: release-assets

      - name: Download Android .so artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bridge-android-*
          merge-multiple: true
          path: release-assets

      - name: List collected assets
        run: ls -la release-assets/

      - name: Create or update GitHub Release with bridge binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.whl
            release-assets/dart_bridge.abi3-android-*.so
          fail_on_unmatched_files: true

  publish:
    name: Publish to pub.dev
    needs:
      - macos
      - ios
      - android
      - windows
      - linux
      - bridge_example_macos
      - bridge_example_ios
      - bridge_example_linux
      - bridge_example_windows
      - collect_release
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          path: '.fvmrc'
          cache: true

      - name: Compute PKG_VER
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Extract the tag name
            tag="${GITHUB_REF#refs/tags/}"
            
            # Remove leading "v" if present
            PKG_VER="${tag#v}"
          else
            # Get the latest tag, or fall back to "v0.0.0" if none exist
            cv=$(git describe --abbrev=0 2>/dev/null || echo "v0.0.0")
            # Remove leading "v" if present
            cv=${cv#v}
            
            # Split into major/minor components
            major=$(echo "$cv" | cut -d. -f1)
            minor=$(echo "$cv" | cut -d. -f2)
            
            # Construct the package version
            PKG_VER="${major}.${minor}.${GITHUB_RUN_NUMBER}"
          fi
          
          export PKG_VER
          echo "PKG_VER=$PKG_VER" | tee -a "$GITHUB_ENV"

      - name: Configure pub.dev credentials
        run: |
          mkdir -p $HOME/.config/dart
          echo "${{ secrets.PUB_DEV_TOKEN }}" | base64 --decode > $HOME/.config/dart/pub-credentials.json

      - name: Patch pubspec versions
        working-directory: "src"
        run: |
          for pkg in \
            "serious_python" \
            "serious_python_platform_interface" \
            "serious_python_android" \
            "serious_python_darwin" \
            "serious_python_windows" \
            "serious_python_linux" \
            "serious_python_bridge"; do

            uv run "$SCRIPTS/patch_pubspec.py" "$pkg/pubspec.yaml" "$PKG_VER"
          done

      - name: Publish packages
        run: |
          publish_pkg () {
            pushd "$1" >/dev/null
            dart pub publish --force
            popd >/dev/null
          }

          publish_pkg src/serious_python_platform_interface
          sleep 600
          publish_pkg src/serious_python_android
          publish_pkg src/serious_python_darwin
          publish_pkg src/serious_python_windows
          publish_pkg src/serious_python_linux
          sleep 600
          publish_pkg src/serious_python
          sleep 600
          # Bridge depends on serious_python + serious_python_darwin; publish
          # last so all its path-deps already resolve on pub.dev.
          publish_pkg src/serious_python_bridge